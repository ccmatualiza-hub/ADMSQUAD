services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    image: ccm-app-backend:1.0.0
    container_name: ccm_backend
    restart: unless-stopped
    environment:
      - APP_PORT=3001
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=${FRONTEND_URL}
      - TZ=America/Sao_Paulo
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - ccm_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runtime
    image: ccm-app-frontend:1.0.0
    container_name: ccm_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    environment:
      - TZ=America/Sao_Paulo
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - ccm_network

networks:
  ccm_network:
    driver: bridge
